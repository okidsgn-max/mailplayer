<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Аудио плеер | Zvuk B2B</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle at 30% 10%, #0a0a0a, #151515);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      font-family: 'SB Sans Display', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }

    .player-card {
      width: 360px;
      max-width: 100%;
      position: relative;
      box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.5);
    }

    /* Фоновый слой: новый SVG (360x491) */
    .shape-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .shape-layer svg {
      width: 100%;
      height: auto;
      display: block;
    }

    /* Контент поверх фона */
    .content {
      position: relative;
      z-index: 2;
      padding: 24px 20px 32px;
      display: flex;
      flex-direction: column;
    }

    /* Верхняя строка */
    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }

    .logo-left img {
      height: 32px;
      width: auto;
      display: block;
    }

    .price-right img {
      height: 32px;
      width: auto;
      display: block;
    }

    /* Центральный блок: увеличенный логотип (132px) и отступ вниз 80px */
    .center-block {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 20px 0 80px;
      min-height: 160px;
    }

    .b2b-icon {
      position: relative;
      z-index: 2;
      width: 132px;  /* +20% относительно 110px */
      height: auto;
    }

    .b2b-svg {
      width: 100%;
      height: auto;
      display: block;
      filter: drop-shadow(0 0 5px rgba(38,192,156,0.3));
    }

    /* Блок текста и кнопка play */
    .play-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
    }

    .demo-text {
      color: white;
      font-size: 16px;
      font-weight: 400;
      line-height: 1.3;
      letter-spacing: 0.2px;
      max-width: 210px;
    }

    .play-icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      width: 48px;
      height: 48px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s;
    }

    .play-icon-btn:hover {
      transform: scale(1.02);
    }

    .play-icon-btn:active {
      transform: scale(0.98);
    }

    /* Используем play.svg */
    .play-icon-img {
      width: 48px;
      height: 48px;
      display: block;
    }

    /* Пауза — белый круг с двумя полосками */
    .pause-custom {
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: white;
      border-radius: 9999px;
    }

    .pause-custom span {
      display: inline-block;
      width: 6px;
      height: 22px;
      background: #202020;
      border-radius: 2px;
    }

    /* Кнопка регистрации */
    .register-btn-wrap {
      display: flex;
      justify-content: center;
      margin-top: 8px;
    }

    .register-btn {
      display: block;
      width: 100%;
      max-width: 320px;
      background: #00B39B;
      border-radius: 57.58px;
      padding: 12px 26px;
      text-align: center;
      color: white;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      font-family: inherit;
      transition: background 0.2s, transform 0.1s;
    }

    .register-btn:hover {
      background: #008a70;
      transform: translateY(-1px);
    }

    .register-btn:active {
      transform: translateY(1px);
    }

    @media (max-width: 380px) {
      .content {
        padding: 20px 16px 28px;
      }
      .demo-text {
        font-size: 14px;
        max-width: 180px;
      }
      .b2b-icon {
        width: 110px;
      }
      .center-block {
        margin-bottom: 60px;
      }
      .register-btn {
        font-size: 14px;
        padding: 10px 20px;
      }
    }
  </style>
</head>
<body>
<div class="player-card">
  <!-- Фоновый слой: новый SVG (360x491) с точным path -->
  <div class="shape-layer">
    <svg width="360" height="491" viewBox="0 0 360 491" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M340 0C351.046 5.15406e-06 360 8.95431 360 20V471C360 482.046 351.046 491 340 491H20C8.95431 491 1.61075e-07 482.046 0 471V20C2.5772e-06 8.95431 8.95431 8.05322e-08 20 0H340ZM180.375 24C174.653 24 170.015 28.6387 170.015 34.3604V35H139.5C133.701 35 129 39.701 129 45.5C129 51.299 133.701 56 139.5 56H222.144C226.483 56 230 52.4825 230 48.1436C230 40.8846 224.115 35 216.856 35H190.689C190.717 34.6764 190.735 34.3493 190.735 34.0186V33.625C190.735 28.3094 186.426 24.0002 181.11 24H180.375Z" fill="#202020"/>
    </svg>
  </div>

  <div class="content">
    <!-- Верхняя строка -->
    <div class="top-row">
      <div class="logo-left">
        <img src="logo.svg" alt="Логотип" onerror="this.onerror=null; this.style.display='none'">
      </div>
      <div class="price-right">
        <img src="0rub.svg" alt="0 руб" onerror="this.onerror=null; this.style.display='none'">
      </div>
    </div>

    <!-- Увеличенный логотип с анимированным градиентом -->
    <div class="center-block">
      <div class="b2b-icon">
        <svg class="b2b-svg" viewBox="0 0 148 148" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="animatedGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#26C09C">
                <animate attributeName="stop-color" values="#26C09C;#1a8f72;#26C09C" dur="4s" repeatCount="indefinite" />
              </stop>
              <stop offset="50%" stop-color="#1a8f72">
                <animate attributeName="stop-color" values="#1a8f72;#3cd6b0;#1a8f72" dur="4s" repeatCount="indefinite" />
              </stop>
              <stop offset="100%" stop-color="#26C09C">
                <animate attributeName="stop-color" values="#26C09C;#1a8f72;#26C09C" dur="4s" repeatCount="indefinite" />
              </stop>
            </linearGradient>
          </defs>
          <path fill-rule="evenodd" clip-rule="evenodd" 
                d="M74 0C52.2563 0 41.2451 2.9228 32.5022 6.54552C20.7457 11.4125 11.413 20.7512 6.54581 32.5008C2.92293 41.2432 0 52.254 0 74.0032C0 95.7525 2.92293 106.757 6.54581 115.506C11.413 127.262 20.7521 136.594 32.5022 141.461C41.2515 145.084 52.2563 148 74 148C95.7437 148 106.755 145.077 115.504 141.461C127.261 136.594 136.593 127.255 141.461 115.506C145.084 106.757 148 95.7525 148 74.0032C148 52.254 145.077 41.2497 141.461 32.5008C136.593 20.7448 127.254 11.4125 115.504 6.54552C106.761 2.9228 95.7502 0 74 0ZM39.884 24.3545C45.8725 21.8724 54.3043 19.2801 74.0065 19.2801C93.7152 19.2801 102.14 21.8724 108.129 24.3545C115.154 27.2644 120.741 32.8507 123.657 39.8823C126.14 45.8705 128.732 54.3019 128.732 74.0032C128.732 93.7046 126.14 102.136 123.657 108.124C122.368 111.235 120.559 114.061 118.33 116.504C117.552 117.353 117.079 117.865 116.71 118.176C116.541 117.644 116.405 116.834 116.191 115.512C109.276 72.6099 75.3999 38.7417 32.5022 31.8268C31.1801 31.6129 30.3699 31.4768 29.8385 31.3083C30.1496 30.9389 30.6616 30.4658 31.5106 29.6881C33.9475 27.4588 36.7796 25.6507 39.8905 24.361L39.884 24.3545ZM29.4885 31.1593H29.4756V31.1528H29.482L29.4885 31.1593ZM21.0049 51.1652C21.1216 50.5301 21.1929 50.1931 21.2641 49.9663C21.5039 49.9533 21.8539 49.9792 22.5085 50.0311C62.7879 53.0641 94.9466 85.2149 97.9797 125.499C98.0315 126.154 98.051 126.503 98.0445 126.743C97.8177 126.815 97.4806 126.879 96.8455 127.003C93.1254 127.709 88.5304 128.266 82.6456 128.538C81.9068 128.571 81.4985 128.59 81.2198 128.571C81.1356 128.273 81.0773 127.839 80.9671 127.054C76.5794 96.0053 52.0165 71.4434 20.966 67.0559C20.1818 66.9458 19.7541 66.8809 19.4559 66.8032C19.4365 66.518 19.4559 66.1162 19.4884 65.3774C19.7606 59.4929 20.3179 54.8981 21.0243 51.1782L21.0049 51.1652ZM19.8383 88.196C19.7606 87.2757 19.7152 86.7508 19.7281 86.3944C20.0716 86.4203 20.5642 86.5175 21.4327 86.6925C41.4136 90.8272 57.1624 106.569 61.3037 126.555C61.4852 127.424 61.5824 127.923 61.6019 128.266C61.2454 128.279 60.7204 128.24 59.8001 128.156C49.7481 127.262 44.2004 125.434 39.8776 123.639C32.8522 120.729 27.2655 115.143 24.3491 108.111C22.5539 103.789 20.7262 98.2346 19.8318 88.1831L19.8383 88.196Z" 
                fill="url(#animatedGrad)"/>
        </svg>
      </div>
    </div>

    <!-- Текст и кнопка Play (используется play.svg) -->
    <div class="play-row">
      <div class="demo-text">
        Демо-версия плейлиста<br>для вашего бизнеса
      </div>
      <button class="play-icon-btn" id="playPauseBtn">
        <img src="play.svg" alt="Play" class="play-icon-img" id="playIcon">
      </button>
    </div>

    <!-- Кнопка регистрации -->
    <div class="register-btn-wrap">
      <a href="https://app.zvuk-b2b.com/register?roistat_visit=5641964" class="register-btn" target="_blank" rel="noopener noreferrer">
        Попробуйте 7 дней бесплатно
      </a>
    </div>
  </div>
</div>

<script>
  const audio = new Audio('https://okidsgn-max.github.io/mailplayer/pst.mp3');
  const playPauseBtn = document.getElementById('playPauseBtn');
  const playIcon = document.getElementById('playIcon');
  let isPlaying = false;
  let pauseElement = null;

  function createPauseIcon() {
    const div = document.createElement('div');
    div.className = 'pause-custom';
    div.innerHTML = '<span></span><span></span>';
    return div;
  }

  function updateUI(playing) {
    if (playing) {
      playIcon.style.display = 'none';
      if (!pauseElement) {
        pauseElement = createPauseIcon();
        playPauseBtn.appendChild(pauseElement);
      }
    } else {
      playIcon.style.display = 'block';
      if (pauseElement) {
        pauseElement.remove();
        pauseElement = null;
      }
    }
  }

  audio.addEventListener('ended', () => {
    isPlaying = false;
    updateUI(false);
  });

  function togglePlay() {
    if (isPlaying) {
      audio.pause();
    } else {
      audio.play();
    }
    isPlaying = !isPlaying;
    updateUI(isPlaying);
  }

  playPauseBtn.addEventListener('click', togglePlay);
  audio.preload = 'metadata';
</script>
</body>
</html>
