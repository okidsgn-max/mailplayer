<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Аудио плеер | Zvuk B2B</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: radial-gradient(circle at 30% 10%, #0B1120, #030712);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    /* Карточка плеера — тёмная, с лёгким свечением (как на okidsgn, но с акцентами zvuk-b2b) */
    .player-card {
      max-width: 560px;
      width: 100%;
      background: rgba(18, 25, 40, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 40px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.5);
      padding: 36px 32px 44px;
      transition: all 0.2s ease;
    }

    /* Логотип */
    .logo {
      display: flex;
      justify-content: center;
      margin-bottom: 32px;
    }

    .logo img {
      max-width: 200px;
      width: 100%;
      height: auto;
      display: block;
      filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.3));
    }

    /* Обёртка плеера */
    .audio-wrapper {
      margin-bottom: 36px;
    }

    audio {
      width: 100%;
      display: block;
      outline: none;
      border-radius: 56px;
    }

    /* Кастомизация нативного плеера под стиль zvuk-b2b (акцент — бирюзовый) */
    audio::-webkit-media-controls-panel {
      background-color: rgba(26, 35, 50, 0.9);
      border-radius: 56px;
    }

    audio::-webkit-media-controls-play-button {
      background-color: #00b399;
      border-radius: 50%;
      transition: 0.1s;
    }

    audio::-webkit-media-controls-play-button:hover {
      background-color: #008a70;
    }

    audio::-webkit-media-controls-current-time-display,
    audio::-webkit-media-controls-time-remaining-display {
      color: #e2e8f0;
      font-weight: 500;
    }

    audio::-webkit-media-controls-timeline {
      background-color: #334155;
      border-radius: 3px;
    }

    audio::-webkit-media-controls-volume-slider {
      background-color: #334155;
      border-radius: 3px;
    }

    /* Кнопка регистрации — чистый стиль zvuk-b2b.com (без иконки) */
    .register-link {
      display: flex;
      justify-content: center;
      margin-top: 8px;
    }

    .register-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background-color: #00b399;
      padding: 16px 32px;
      border-radius: 60px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      line-height: 1.2;
      letter-spacing: 0.2px;
      color: #FFFFFF;
      text-decoration: none;
      transition: all 0.2s ease;
      width: 100%;
      max-width: 280px;
      border: none;
      cursor: pointer;
      text-align: center;
    }

    /* Эффекты при наведении — как на zvuk-b2b */
    .register-btn:hover {
      background-color: #008a70;
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
    }

    .register-btn:active {
      transform: translateY(1px);
      box-shadow: none;
    }

    /* Фокус для доступности */
    .register-btn:focus-visible {
      outline: 2px solid #00b399;
      outline-offset: 2px;
    }

    /* Маленький текст под кнопкой */
    .helper {
      text-align: center;
      margin-top: 28px;
      font-size: 0.75rem;
      color: #94a3b8;
    }

    /* Адаптация под мобильные */
    @media (max-width: 480px) {
      .player-card {
        padding: 28px 20px 36px;
        border-radius: 32px;
      }
      .register-btn {
        padding: 14px 24px;
        font-size: 0.9rem;
        max-width: 100%;
      }
      .logo img {
        max-width: 150px;
      }
    }
  </style>
</head>
<body>
  <div class="player-card">
    <!-- Логотип из корня папки -->
    <div class="logo">
      <img src="logo.svg" alt="Zvuk B2B" onerror="this.onerror=null; this.src='https://placehold.co/200x80/1e293b/white?text=LOGO';">
    </div>

    <!-- Аудиоплеер -->
    <div class="audio-wrapper">
      <audio controls preload="metadata">
        <source src="https://okidsgn-max.github.io/mailplayer/pst.mp3" type="audio/mpeg">
        Ваш браузер не поддерживает встроенное аудио.
      </audio>
    </div>

    <!-- Кнопка регистрации без иконки, чистый стиль zvuk-b2b -->
    <div class="register-link">
      <a href="https://app.zvuk-b2b.com/register?roistat_visit=5641964" class="register-btn" target="_blank" rel="noopener noreferrer">
        Присоединиться
      </a>
    </div>
    <div class="helper">
      Нажмите, чтобы зарегистрироваться
    </div>
  </div>
</body>
</html>
