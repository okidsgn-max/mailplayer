<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Аудио плеер | Звук Бизнес</title>
  <style>
    /* ***** БАЗОВЫЕ СТИЛИ И ШРИФТЫ (как на zvuk-b2b.com) ***** */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      /* Используем системный шрифт, так как точный шрифт сайта — SBSansDisplay — может быть недоступен */
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Helvetica, sans-serif;
      background: linear-gradient(135deg, #F8F8F8 0%, #EEF0F2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    /* КАРТОЧКА ПЛЕЕРА — светлая, с современными тенями */
    .player-card {
      max-width: 560px;
      width: 100%;
      background: #FFFFFF;
      border-radius: 32px;
      /* Эффект «стекла» убран, сделан упор на чистоту и лёгкость */
      box-shadow: 0 20px 35px -8px rgba(0, 0, 0, 0.1), 0 0 0 1px rgba(0, 0, 0, 0.02);
      padding: 40px 32px 44px;
      transition: all 0.3s ease;
    }

    /* ЛОГОТИП */
    .logo {
      display: flex;
      justify-content: center;
      margin-bottom: 32px;
    }

    .logo img {
      max-width: 200px;
      width: 100%;
      height: auto;
      display: block;
    }

    /* ОБЁРТКА ПЛЕЕРА — минималистичная */
    .audio-wrapper {
      margin-bottom: 32px;
    }

    /* СТИЛИ ДЛЯ НАТИВНОГО АУДИОПЛЕЕРА */
    audio {
      width: 100%;
      display: block;
      outline: none;
    }

    /* КАСТОМИЗАЦИЯ ПЛЕЕРА ДЛЯ WEBKIT (CHROME, SAFARI) */
    audio::-webkit-media-controls-panel {
      background-color: #F4F5F7;
      border-radius: 20px;
    }

    audio::-webkit-media-controls-play-button {
      background-color: #00b399; /* Фирменный цвет кнопки Play */
      border-radius: 50%;
    }

    audio::-webkit-media-controls-play-button:hover {
      background-color: #008a70; /* Затемнение при наведении */
    }

    audio::-webkit-media-controls-current-time-display,
    audio::-webkit-media-controls-time-remaining-display {
      color: #1F2A3A;
      font-weight: 500;
    }

    /* Это важно: цвет слайдера (ползунка) */
    audio::-webkit-media-controls-timeline {
      background-color: #E1E4E8;
      border-radius: 4px;
    }
    
    audio::-webkit-media-controls-volume-slider {
      background-color: #E1E4E8;
      border-radius: 4px;
    }

    /* СТИЛЬ КНОПКИ (ГЛАВНЫЙ ЭЛЕМЕНТ) — ПОЛНОСТЬЮ ПЕРЕРАБОТАН ПОД САЙТ */
    .register-link {
      display: block;
      text-align: center;
      margin-top: 8px;
    }

    .register-btn {
      /* Основа кнопки — полностью скопирована стилистика с сайта zvuk-b2b.com */
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      
      /* Цвет фона и тени — как на сайте */
      background-color: #00b399;         /* Основной цвет бренда */
      box-shadow: none;
      
      padding: 16px 32px;
      border-radius: 60px;               /* Сильно скруглённая, современная кнопка */
      
      font-family: inherit;
      font-size: 1.05rem;
      font-weight: 600;
      line-height: 1.2;
      letter-spacing: 0.3px;
      color: #FFFFFF;
      text-decoration: none;
      
      transition: all 0.2s ease;
      width: 100%;
      max-width: 320px;
      border: none;                      /* Убираем рамку */
      cursor: pointer;
    }

    /* Эффект при наведении (как на сайте) */
    .register-btn:hover {
      background-color: #008a70;          /* Более тёмный оттенок при ховере */
      transform: translateY(-1px);
      box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.15);
    }
    
    /* Эффект при нажатии */
    .register-btn:active {
      transform: translateY(1px);
      box-shadow: none;
    }

    /* Дополнительный стиль для фокуса (a11y) */
    .register-btn:focus-visible {
      outline: 2px solid #00b399;
      outline-offset: 2px;
    }

    /* НЕБОЛЬШОЙ ТЕКСТ-ПОДСКАЗКА */
    .helper {
      text-align: center;
      margin-top: 28px;
      font-size: 0.75rem;
      color: #6C7A8E;
      letter-spacing: 0.2px;
    }

    /* АДАПТИВНОСТЬ ДЛЯ МОБИЛЬНЫХ УСТРОЙСТВ */
    @media (max-width: 480px) {
      .player-card {
        padding: 28px 20px 32px;
        border-radius: 28px;
      }
      .register-btn {
        padding: 14px 24px;
        font-size: 0.95rem;
      }
      .logo img {
        max-width: 150px;
      }
    }
  </style>
</head>
<body>
  <div class="player-card">
    <!-- ЛОГОТИП из корня папки -->
    <div class="logo">
      <img src="logo.svg" alt="Звук Бизнес" onerror="this.onerror=null; this.src='https://placehold.co/200x80/1e293b/white?text=LOGO';">
    </div>

    <!-- АУДИОПЛЕЕР с вашим треком -->
    <div class="audio-wrapper">
      <audio controls preload="metadata">
        <source src="https://okidsgn-max.github.io/mailplayer/pst.mp3" type="audio/mpeg">
        Ваш браузер не поддерживает встроенное аудио.
      </audio>
    </div>

    <!-- ОБНОВЛЁННАЯ КНОПКА РЕГИСТРАЦИИ (стиль Zvuk B2B) -->
    <div class="register-link">
      <a href="https://app.zvuk-b2b.com/register?roistat_visit=5641964" class="register-btn" target="_blank" rel="noopener noreferrer">
        🎧 Присоединиться
      </a>
    </div>
    <div class="helper">
      Нажмите, чтобы начать работать с платформой
    </div>
  </div>
</body>
</html>
