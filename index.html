<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Аудио плеер | Zvuk B2B</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle at 30% 10%, #0a0a0a, #151515);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      font-family: 'SB Sans Display', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }

    /* Карточка ровно как в макете: 360px ширина, фон #202020 */
    .player-card {
      width: 360px;
      max-width: 100%;
      background: #202020;
      border-radius: 0; /* в макете без скругления, но можно добавить лёгкое */
      position: relative;
      padding: 0;
      box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.5);
      overflow: hidden;
    }

    /* Акцентный круг (из макета) */
    .accent-circle {
      width: 148px;
      height: 148px;
      background: #04C9B0;
      position: absolute;
      left: 106px;
      top: 93px;
      border-radius: 50%;
      opacity: 0.8;
      pointer-events: none;
    }

    /* Основной контент с относительным позиционированием (поверх круга) */
    .content {
      position: relative;
      z-index: 2;
      padding: 24px 20px 32px;
      display: flex;
      flex-direction: column;
    }

    /* Верхняя строка: логотип слева, 0rub.svg справа */
    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }

    .logo-left img {
      height: 32px;
      width: auto;
      display: block;
    }

    .price-right img {
      height: 32px;
      width: auto;
      display: block;
    }

    /* Центральная иконка b2b */
    .center-icon {
      display: flex;
      justify-content: center;
      margin: 20px 0 32px;
    }

    .center-icon img {
      width: 80px;
      height: auto;
      display: block;
    }

    /* Блок текст + иконка play */
    .play-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .demo-text {
      color: white;
      font-size: 16px;
      font-weight: 400;
      line-height: 1.3;
      letter-spacing: 0.2px;
      max-width: 210px;
    }

    .play-icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      width: 48px;
      height: 48px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s;
    }

    .play-icon-btn:hover {
      transform: scale(1.02);
    }

    .play-icon-btn:active {
      transform: scale(0.98);
    }

    .play-icon-img {
      width: 48px;
      height: 48px;
      display: block;
    }

    /* Кастомная пауза (две полоски, как в прежнем варианте) */
    .pause-custom {
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: white;
      border-radius: 9999px;
    }

    .pause-custom span {
      display: inline-block;
      width: 6px;
      height: 22px;
      background: #202020;
      border-radius: 2px;
    }

    /* Прогресс-бар и время (сохранённый функционал) */
    .player-progress {
      margin: 8px 0 24px;
    }

    .time-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
      font-size: 12px;
      color: #b0b0b0;
      font-weight: 500;
    }

    input[type="range"] {
      width: 100%;
      height: 4px;
      -webkit-appearance: none;
      background: #3a3a3a;
      border-radius: 4px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]:focus {
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      background: #00B39B;
      border-radius: 50%;
      cursor: pointer;
      border: none;
      box-shadow: none;
    }

    /* Кнопка регистрации — как в макете */
    .register-btn-wrap {
      display: flex;
      justify-content: center;
      margin-top: 8px;
    }

    .register-btn {
      display: block;
      width: 100%;
      max-width: 320px;
      background: #00B39B;
      border-radius: 57.58px;
      padding: 12px 26px;
      text-align: center;
      color: white;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      font-family: inherit;
      transition: background 0.2s, transform 0.1s;
    }

    .register-btn:hover {
      background: #008a70;
      transform: translateY(-1px);
    }

    .register-btn:active {
      transform: translateY(1px);
    }

    /* Адаптация для совсем маленьких экранов */
    @media (max-width: 380px) {
      .content {
        padding: 20px 16px 28px;
      }
      .demo-text {
        font-size: 14px;
        max-width: 180px;
      }
      .register-btn {
        font-size: 14px;
        padding: 10px 20px;
      }
    }
  </style>
</head>
<body>
<div class="player-card">
  <!-- Декоративный круг из макета -->
  <div class="accent-circle"></div>

  <div class="content">
    <!-- Верхняя строка: logo.svg и 0rub.svg -->
    <div class="top-row">
      <div class="logo-left">
        <img src="logo.svg" alt="Логотип" onerror="this.onerror=null; this.style.display='none'">
      </div>
      <div class="price-right">
        <img src="0rub.svg" alt="0 руб" onerror="this.onerror=null; this.style.display='none'">
      </div>
    </div>

    <!-- Центральная иконка icon b2b.svg -->
    <div class="center-icon">
      <img src="icon b2b.svg" alt="B2B" onerror="this.onerror=null; this.style.display='none'">
    </div>

    <!-- Блок текста и кнопка play -->
    <div class="play-row">
      <div class="demo-text">
        Демо-версия плейлиста<br>для вашего бизнеса
      </div>
      <button class="play-icon-btn" id="playPauseBtn">
        <img src="icon_play_48x48.svg" alt="Play" class="play-icon-img" id="playIcon">
      </button>
    </div>

    <!-- Прогресс-бар с временем (сохранённый функционал) -->
    <div class="player-progress">
      <div class="time-row">
        <span id="currentTime">0:00</span>
        <span id="duration">0:00</span>
      </div>
      <input type="range" id="progressBar" value="0" step="0.01">
    </div>

    <!-- Кнопка регистрации -->
    <div class="register-btn-wrap">
      <a href="https://app.zvuk-b2b.com/register?roistat_visit=5641964" class="register-btn" target="_blank" rel="noopener noreferrer">
        Попробуйте 7 дней бесплатно
      </a>
    </div>
  </div>
</div>

<script>
  // Аудиоэлемент
  const audio = new Audio('https://okidsgn-max.github.io/mailplayer/pst.mp3');
  const playPauseBtn = document.getElementById('playPauseBtn');
  const playIcon = document.getElementById('playIcon');
  const currentTimeSpan = document.getElementById('currentTime');
  const durationSpan = document.getElementById('duration');
  const progressBar = document.getElementById('progressBar');

  let isPlaying = false;
  let pauseElement = null;

  // Форматирование времени MM:SS
  function formatTime(seconds) {
    if (isNaN(seconds)) return '0:00';
    const mins = Math.floor(seconds / 60);
    const secs = Math.floor(seconds % 60);
    return `${mins}:${secs < 10 ? '0' + secs : secs}`;
  }

  // Создать кастомную иконку паузы (как в предыдущем варианте)
  function createPauseIcon() {
    const div = document.createElement('div');
    div.className = 'pause-custom';
    div.innerHTML = '<span></span><span></span>';
    return div;
  }

  // Обновить UI: показать play или паузу
  function updateUI(playing) {
    if (playing) {
      // Прячем img с play, показываем паузу
      playIcon.style.display = 'none';
      if (!pauseElement) {
        pauseElement = createPauseIcon();
        playPauseBtn.appendChild(pauseElement);
      }
    } else {
      playIcon.style.display = 'block';
      if (pauseElement) {
        pauseElement.remove();
        pauseElement = null;
      }
    }
  }

  // Загрузка метаданных (длительность)
  audio.addEventListener('loadedmetadata', () => {
    durationSpan.textContent = formatTime(audio.duration);
    progressBar.max = audio.duration;
  });

  // Обновление времени и ползунка
  audio.addEventListener('timeupdate', () => {
    currentTimeSpan.textContent = formatTime(audio.currentTime);
    progressBar.value = audio.currentTime;
  });

  // По окончании трека
  audio.addEventListener('ended', () => {
    isPlaying = false;
    updateUI(false);
    progressBar.value = 0;
    currentTimeSpan.textContent = formatTime(0);
  });

  // Переключение play/pause
  function togglePlay() {
    if (isPlaying) {
      audio.pause();
    } else {
      audio.play();
    }
    isPlaying = !isPlaying;
    updateUI(isPlaying);
  }

  playPauseBtn.addEventListener('click', togglePlay);

  // Перемотка по прогресс-бару
  progressBar.addEventListener('input', (e) => {
    const newTime = parseFloat(e.target.value);
    audio.currentTime = newTime;
    currentTimeSpan.textContent = formatTime(newTime);
  });

  // Предзагрузка метаданных
  audio.preload = 'metadata';
</script>
</body>
</html>
