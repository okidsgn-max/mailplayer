<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Аудио плеер | Zvuk B2B</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: radial-gradient(circle at 30% 10%, #0B1120, #030712);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    /* Карточка плеера — тёмная, с эффектом стекла (как в предыдущем варианте) */
    .player-card {
      max-width: 560px;
      width: 100%;
      background: rgba(18, 25, 40, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 40px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.5);
      padding: 32px 28px 40px;
    }

    /* Логотип — слева, маленький */
    .logo {
      display: flex;
      justify-content: flex-start;
      margin-bottom: 28px;
    }

    .logo img {
      max-width: 110px;
      width: 100%;
      height: auto;
      display: block;
      filter: drop-shadow(0 2px 5px rgba(0, 0, 0, 0.3));
    }

    /* Кастомный плеер */
    .custom-player {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 60px;
      padding: 16px 20px;
      margin-bottom: 32px;
    }

    /* Панель управления: кнопка play и время */
    .player-controls {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 12px;
    }

    /* Кнопка Play / Pause */
    .play-pause-btn {
      background: none;
      border: none;
      cursor: pointer;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s ease;
    }

    .play-pause-btn:hover {
      transform: scale(1.02);
    }

    .play-pause-btn:active {
      transform: scale(0.98);
    }

    /* Иконка Play из SVG */
    .play-icon {
      width: 36px;
      height: 36px;
      display: block;
    }

    /* Иконка паузы — две светло-серые полоски (без свечения) */
    .pause-icon {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .pause-icon span {
      display: inline-block;
      width: 8px;
      height: 24px;
      background-color: #cbd5e1; /* светло-серый */
      border-radius: 2px;
    }

    /* Время (светло-серое, без свечения) */
    .time-display {
      font-size: 1rem;
      font-weight: 500;
      color: #cbd5e1;
      letter-spacing: 0.3px;
      background: none;
      text-shadow: none;
    }

    /* Прогресс-бар */
    .progress-container {
      width: 100%;
      margin-top: 6px;
    }

    input[type="range"] {
      width: 100%;
      height: 4px;
      -webkit-appearance: none;
      background: #334155;
      border-radius: 4px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]:focus {
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      background: #00b399;
      border-radius: 50%;
      cursor: pointer;
      border: none;
      box-shadow: none;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      background: #008a70;
    }

    /* Кнопка регистрации (стиль Zvuk B2B) */
    .register-link {
      display: flex;
      justify-content: center;
      margin-top: 8px;
    }

    .register-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background-color: #00b399;
      padding: 16px 32px;
      border-radius: 60px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      line-height: 1.2;
      letter-spacing: 0.2px;
      color: #FFFFFF;
      text-decoration: none;
      transition: all 0.2s ease;
      width: 100%;
      max-width: 280px;
      border: none;
      cursor: pointer;
      text-align: center;
    }

    .register-btn:hover {
      background-color: #008a70;
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
    }

    .register-btn:active {
      transform: translateY(1px);
    }

    .helper {
      text-align: center;
      margin-top: 28px;
      font-size: 0.75rem;
      color: #94a3b8;
    }

    /* Адаптивность */
    @media (max-width: 480px) {
      .player-card {
        padding: 24px 20px 32px;
        border-radius: 32px;
      }
      .logo img {
        max-width: 90px;
      }
      .play-pause-btn {
        width: 40px;
        height: 40px;
      }
      .play-icon {
        width: 30px;
        height: 30px;
      }
      .pause-icon {
        width: 30px;
        height: 30px;
      }
      .pause-icon span {
        width: 6px;
        height: 20px;
      }
      .time-display {
        font-size: 0.85rem;
      }
      .register-btn {
        padding: 14px 24px;
        font-size: 0.9rem;
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
<div class="player-card">
  <!-- Логотип слева, маленький -->
  <div class="logo">
    <img src="logo.svg" alt="Zvuk B2B" onerror="this.onerror=null; this.src='https://placehold.co/110x40/1e293b/white?text=LOGO';">
  </div>

  <!-- Кастомный плеер (без скачивания, ускорения) -->
  <div class="custom-player">
    <div class="player-controls">
      <button class="play-pause-btn" id="playPauseBtn">
        <img src="Icon_play_36x36.svg" alt="Play" class="play-icon" id="playIcon">
      </button>
      <div class="time-display">
        <span id="currentTime">0:00</span> / <span id="duration">0:00</span>
      </div>
    </div>
    <div class="progress-container">
      <input type="range" id="progressBar" value="0" step="0.01">
    </div>
  </div>

  <!-- Кнопка регистрации (без иконки) -->
  <div class="register-link">
    <a href="https://app.zvuk-b2b.com/register?roistat_visit=5641964" class="register-btn" target="_blank" rel="noopener noreferrer">
      Присоединиться
    </a>
  </div>
  <div class="helper">
    Нажмите, чтобы зарегистрироваться
  </div>
</div>

<script>
  // Элементы
  const audio = new Audio('https://okidsgn-max.github.io/mailplayer/pst.mp3');
  const playPauseBtn = document.getElementById('playPauseBtn');
  const playIcon = document.getElementById('playIcon');
  const currentTimeSpan = document.getElementById('currentTime');
  const durationSpan = document.getElementById('duration');
  const progressBar = document.getElementById('progressBar');

  let isPlaying = false;
  let pauseIconElement = null;

  function formatTime(seconds) {
    if (isNaN(seconds)) return '0:00';
    const mins = Math.floor(seconds / 60);
    const secs = Math.floor(seconds % 60);
    return `${mins}:${secs < 10 ? '0' + secs : secs}`;
  }

  // Создать иконку паузы
  function createPauseIcon() {
    const div = document.createElement('div');
    div.className = 'pause-icon';
    div.innerHTML = '<span></span><span></span>';
    return div;
  }

  // Обновить UI в зависимости от состояния
  function updateUIForPlaying(playing) {
    if (playing) {
      // Прячем img с play, показываем паузу
      playIcon.style.display = 'none';
      if (!pauseIconElement) {
        pauseIconElement = createPauseIcon();
        playPauseBtn.appendChild(pauseIconElement);
      }
    } else {
      // Показываем play, убираем паузу
      playIcon.style.display = 'block';
      if (pauseIconElement) {
        pauseIconElement.remove();
        pauseIconElement = null;
      }
    }
  }

  audio.addEventListener('loadedmetadata', () => {
    durationSpan.textContent = formatTime(audio.duration);
    progressBar.max = audio.duration;
  });

  audio.addEventListener('timeupdate', () => {
    currentTimeSpan.textContent = formatTime(audio.currentTime);
    progressBar.value = audio.currentTime;
  });

  audio.addEventListener('ended', () => {
    isPlaying = false;
    updateUIForPlaying(false);
    progressBar.value = 0;
    currentTimeSpan.textContent = formatTime(0);
  });

  function togglePlay() {
    if (isPlaying) {
      audio.pause();
    } else {
      audio.play();
    }
    isPlaying = !isPlaying;
    updateUIForPlaying(isPlaying);
  }

  playPauseBtn.addEventListener('click', togglePlay);

  progressBar.addEventListener('input', (e) => {
    const newTime = parseFloat(e.target.value);
    audio.currentTime = newTime;
    currentTimeSpan.textContent = formatTime(newTime);
  });

  audio.preload = 'metadata';
</script>
</body>
</html>
