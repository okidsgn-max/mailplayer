<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Аудио плеер | Zvuk B2B</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle at 30% 10%, #0a0a0a, #151515);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      font-family: 'SB Sans Display', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }

    .player-card {
      width: 360px;
      max-width: 100%;
      background: #202020;
      position: relative;
      box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.5);
    }

    .content {
      position: relative;
      z-index: 2;
      padding: 24px 20px 32px;
      display: flex;
      flex-direction: column;
    }

    /* Верхняя строка */
    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }

    .logo-left img {
      height: 32px;
      width: auto;
      display: block;
    }

    .price-right img {
      height: 32px;
      width: auto;
      display: block;
    }

    /* Центральный блок: подложка shape.svg + логотип с градиентом */
    .center-block {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 20px 0 60px; /* увеличен отступ снизу, чтобы текст/play опустились */
      min-height: 160px;
    }

    /* Подложка — векторный shape.svg */
    .shape-bg {
      position: absolute;
      width: 148px;
      height: 148px;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .shape-bg img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
    }

    /* Контейнер для логотипа с анимированным градиентом */
    .b2b-icon {
      position: relative;
      z-index: 2;
      width: 110px;
      height: auto;
    }

    /* Внедрённый SVG логотипа — заменяем на свой, но градиент будет работать */
    /* Для демонстрации я создал пример логотипа в виде стилизованной плашки,
       вы можете заменить теги <path> на пути из вашего icon b2b.svg */
    .b2b-svg {
      width: 100%;
      height: auto;
      display: block;
      filter: drop-shadow(0 0 5px rgba(38,192,156,0.3));
    }

    /* Блок текста и кнопка play */
    .play-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
    }

    .demo-text {
      color: white;
      font-size: 16px;
      font-weight: 400;
      line-height: 1.3;
      letter-spacing: 0.2px;
      max-width: 210px;
    }

    .play-icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      width: 48px;
      height: 48px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s;
    }

    .play-icon-btn:hover {
      transform: scale(1.02);
    }

    .play-icon-btn:active {
      transform: scale(0.98);
    }

    .play-icon-img {
      width: 48px;
      height: 48px;
      display: block;
    }

    .pause-custom {
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: white;
      border-radius: 9999px;
    }

    .pause-custom span {
      display: inline-block;
      width: 6px;
      height: 22px;
      background: #202020;
      border-radius: 2px;
    }

    /* Кнопка регистрации */
    .register-btn-wrap {
      display: flex;
      justify-content: center;
      margin-top: 8px;
    }

    .register-btn {
      display: block;
      width: 100%;
      max-width: 320px;
      background: #00B39B;
      border-radius: 57.58px;
      padding: 12px 26px;
      text-align: center;
      color: white;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      font-family: inherit;
      transition: background 0.2s, transform 0.1s;
    }

    .register-btn:hover {
      background: #008a70;
      transform: translateY(-1px);
    }

    .register-btn:active {
      transform: translateY(1px);
    }

    @media (max-width: 380px) {
      .content {
        padding: 20px 16px 28px;
      }
      .demo-text {
        font-size: 14px;
        max-width: 180px;
      }
      .b2b-icon {
        width: 90px;
      }
      .center-block {
        margin-bottom: 50px;
      }
      .register-btn {
        font-size: 14px;
        padding: 10px 20px;
      }
    }
  </style>
</head>
<body>
<div class="player-card">
  <div class="content">
    <!-- Верхняя строка -->
    <div class="top-row">
      <div class="logo-left">
        <img src="logo.svg" alt="Логотип" onerror="this.onerror=null; this.style.display='none'">
      </div>
      <div class="price-right">
        <img src="0rub.svg" alt="0 руб" onerror="this.onerror=null; this.style.display='none'">
      </div>
    </div>

    <!-- Центральный блок: shape.svg подложка, поверх неё логотип с градиентом -->
    <div class="center-block">
      <div class="shape-bg">
        <img src="shape.svg" alt="shape" onerror="this.onerror=null; this.style.display='none'">
      </div>
      <div class="b2b-icon">
        <!-- ВСТРОЕННЫЙ SVG ЛОГОТИП с анимированным градиентом -->
        <!-- ВНИМАНИЕ: замените внутренность <svg> на содержимое вашего icon b2b.svg -->
        <svg class="b2b-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="animatedGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#26C09C">
                <animate attributeName="stop-color" values="#26C09C;#1a8f72;#26C09C" dur="4s" repeatCount="indefinite" />
              </stop>
              <stop offset="50%" stop-color="#1a8f72">
                <animate attributeName="stop-color" values="#1a8f72;#3cd6b0;#1a8f72" dur="4s" repeatCount="indefinite" />
              </stop>
              <stop offset="100%" stop-color="#26C09C">
                <animate attributeName="stop-color" values="#26C09C;#1a8f72;#26C09C" dur="4s" repeatCount="indefinite" />
              </stop>
            </linearGradient>
          </defs>
          <!-- Пример сложной фигуры (замените на пути вашего icon b2b.svg) -->
          <rect x="20" y="20" width="160" height="160" rx="30" fill="url(#animatedGrad)" />
          <text x="100" y="120" font-size="40" text-anchor="middle" fill="white" font-weight="bold">B2B</text>
          <!-- Если ваш icon b2b.svg — это набор кривых, скопируйте их сюда вместо rect+text -->
        </svg>
      </div>
    </div>

    <!-- Текст и кнопка Play (ниже) -->
    <div class="play-row">
      <div class="demo-text">
        Демо-версия плейлиста<br>для вашего бизнеса
      </div>
      <button class="play-icon-btn" id="playPauseBtn">
        <img src="icon_play_48x48.svg" alt="Play" class="play-icon-img" id="playIcon">
      </button>
    </div>

    <!-- Кнопка регистрации -->
    <div class="register-btn-wrap">
      <a href="https://app.zvuk-b2b.com/register?roistat_visit=5641964" class="register-btn" target="_blank" rel="noopener noreferrer">
        Попробуйте 7 дней бесплатно
      </a>
    </div>
  </div>
</div>

<script>
  const audio = new Audio('https://okidsgn-max.github.io/mailplayer/pst.mp3');
  const playPauseBtn = document.getElementById('playPauseBtn');
  const playIcon = document.getElementById('playIcon');
  let isPlaying = false;
  let pauseElement = null;

  function createPauseIcon() {
    const div = document.createElement('div');
    div.className = 'pause-custom';
    div.innerHTML = '<span></span><span></span>';
    return div;
  }

  function updateUI(playing) {
    if (playing) {
      playIcon.style.display = 'none';
      if (!pauseElement) {
        pauseElement = createPauseIcon();
        playPauseBtn.appendChild(pauseElement);
      }
    } else {
      playIcon.style.display = 'block';
      if (pauseElement) {
        pauseElement.remove();
        pauseElement = null;
      }
    }
  }

  audio.addEventListener('ended', () => {
    isPlaying = false;
    updateUI(false);
  });

  function togglePlay() {
    if (isPlaying) {
      audio.pause();
    } else {
      audio.play();
    }
    isPlaying = !isPlaying;
    updateUI(isPlaying);
  }

  playPauseBtn.addEventListener('click', togglePlay);
  audio.preload = 'metadata';
</script>
</body>
</html>
